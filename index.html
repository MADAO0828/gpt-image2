<script>
// 立即注销旧 Service Worker，防止移动端缓存问题
(function(){
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(reg){reg.unregister()});
      console.log('[SW] 已注销 ' + regs.length + ' 个 Service Worker');
    });
    var origRegister = navigator.serviceWorker.register;
    navigator.serviceWorker.register = function(){
      console.warn('[SW] 注册已禁用');
      return Promise.reject(new Error('ServiceWorker disabled'));
    };
  }
})();
</script>
<script>
  if(!('noModule' in HTMLScriptElement.prototype)){

<script>
  var __s='gpt-image-playground';
  // 每次页面加载都同步云端设置到 localStorage（覆盖旧数据）
  // 必须移除之前检查 apiKey 才返回的逻辑，确保管理员设置能实时同步
  function doSync(){
    fetch('/.well-known/img-runtime-config.json?v='+Date.now()).then(function(r){return r.ok?r.json():null}).then(function(cfg){
      if(!cfg)return;
      try{
        var st={state:{settings:{}},version:2};
        // 注意！SPA 内部使用 baseUrl 字段（不是 apiUrl）！！！API URL 参数才用 apiUrl
        if(cfg.defaultApiUrl)st.state.settings.baseUrl=cfg.defaultApiUrl;
        if(cfg.apiKey)st.state.settings.apiKey=cfg.apiKey;
        if(cfg.defaultModel)st.state.settings.model=cfg.defaultModel;
        if(cfg.apiMode)st.state.settings.apiMode=cfg.apiMode;
        if(cfg.timeout)st.state.settings.timeout=cfg.timeout;
        // 注意！SPA 内部使用 apiProxy 字段（不是 apiProxyEnabled）！！！
        if(cfg.apiProxyEnabled)st.state.settings.apiProxy=true;
        if(cfg.streamImages)st.state.settings.streamImages=true;
        localStorage.setItem(__s,JSON.stringify(st));
        console.log('[Sync] 云端设置已同步到本地');
      }catch(e){}
    }).catch(function(){});
    try{
      var pp=sessionStorage.getItem('prompt_to_use');
      if(pp){
        sessionStorage.removeItem('prompt_to_use');
        var r2=localStorage.getItem(__s),st2=r2?JSON.parse(r2):{state:{},version:2};
        if(!st2.state)st2.state={};
        if(!st2.state.galleryInputDraft)st2.state.galleryInputDraft={};
        st2.state.galleryInputDraft.prompt=pp;
        localStorage.setItem(__s,JSON.stringify(st2));
      }
    }catch(e){}
  }

  // 登录后立即同步（admin_auth 由 login.html 设置）
  if(sessionStorage.getItem('admin_auth')==='1'){
    sessionStorage.removeItem('admin_auth');
    doSync()
  }
  // 首次加载：先检查登录状态，再同步
  if(!sessionStorage.getItem('_synced')){
    sessionStorage.setItem('_synced','1');
    fetch('/api/auth/me').then(function(r){
      if(!r.ok){location.replace('/login');return}
      doSync()
    }).catch(function(){location.replace('/login')})
  }else{
    // 非首次加载：也执行同步，确保管理员后台修改的设置能更新到所有设备
    doSync()
  }
</script>
