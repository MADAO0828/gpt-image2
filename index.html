<script>
var __s = 'gpt-image-playground';

try {
  var pp = sessionStorage.getItem('prompt_to_use');
  if (pp) {
    sessionStorage.removeItem('prompt_to_use');
    var existing = localStorage.getItem(__s);
    var st = existing ? JSON.parse(existing) : { state: {}, version: 2 };
    if (!st.state) st.state = {};
    if (!st.state.galleryInputDraft) st.state.galleryInputDraft = {};
    st.state.galleryInputDraft.prompt = pp;
    localStorage.setItem(__s, JSON.stringify(st));
  }
} catch(e) {}

function doSync() {
  var url = '/.well-known/img-runtime-config.json?v=' + Date.now();
  fetch(url).then(function(r) { return r.ok ? r.json() : null; }).then(function(cfg) {
    if (!cfg) return;
    try {
      var st = {
        state: {
          settings: {
            baseUrl: cfg.defaultApiUrl || '',
            apiKey: '',
            model: cfg.defaultModel || 'gpt-image-2',
            apiMode: cfg.apiMode || 'images',
            timeout: cfg.timeout || 600,
            apiProxy: true,
            streamImages: !!cfg.streamImages,
            size: cfg.size || '',
            quality: cfg.quality || 'standard',
            output_format: cfg.output_format || 'png',
            codexCli: !!cfg.codexCli,
            moderation: !!cfg.moderation,
            persistInput: !!cfg.persistInput,
            scrollAfterSubmit: !!cfg.scrollAfterSubmit,
            apiProvider: cfg.apiProvider || 'openai',
            agentWebSearch: !!cfg.agentWebSearch,
            agentMaxRounds: cfg.agentMaxRounds || 32,
            agentScrollAfterSubmit: !!cfg.agentScrollAfterSubmit
          }
        },
        version: 2
      };
      try {
        var ex = JSON.parse(localStorage.getItem(__s) || '{}');
        if (ex.state && ex.state.galleryInputDraft) {
          st.state.galleryInputDraft = ex.state.galleryInputDraft;
        }
      } catch(e) {}
      localStorage.setItem(__s, JSON.stringify(st));
    } catch(e) {}
  }).catch(function(){});
}

(function(){
  fetch('/api/auth/me', { cache: 'no-store' }).then(function(r) {
    if (!r.ok) { location.replace('/login'); return; }
    doSync();
  }).catch(function(){
    location.replace('/login');
  });
})();
</script>
