<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:var(--loading-bg);color:#cbd5e1;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
[aria-label="settings"],[aria-label="Settings"]{display:none!important;visibility:hidden!important}
.loading-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--loading-bg);z-index:99999}
.loading-screen.hidden{opacity:0;pointer-events:none;transition:opacity .35s}
.spinner{width:40px;height:40px;border:3px solid var(--loading-spinner);border-top-color:var(--loading-spinner-top);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen p{margin-top:20px;font-size:14px;color:#64748b;letter-spacing:.3px}
.site-nav{position:fixed;top:10px;right:12px;z-index:9999;display:flex;align-items:center;gap:2px;background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:10px;padding:3px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 2px 8px rgba(0,0,0,0.06)}html.dark .site-nav{background:rgba(17,24,39,.78);border-color:rgba(255,255,255,.1)}
.site-nav a{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:15px;color:#475569;transition:background .18s,color .18s,transform .18s}html.dark .site-nav a{color:#cbd5e1}
.site-nav a:hover{background:rgba(99,102,241,0.12);color:#6366f1}html.dark .site-nav a:hover{background:rgba(59,130,246,.18);color:#fff}
.site-nav a:active{transform:scale(.94)}
.site-nav .label{font-size:11px;color:#64748b;padding:0 7px 0 5px;letter-spacing:.02em}html.dark .site-nav .label{color:#94a3b8}
.site-nav .divider{width:1px;height:18px;background:rgba(0,0,0,0.08);margin:0 2px}html.dark .site-nav .divider{background:rgba(255,255,255,.12)}
@media(max-width:640px){.site-nav{top:8px;right:8px}.site-nav .label{display:none}.site-nav a{width:34px;height:34px}}
:root{--loading-bg:#e5e7eb;--loading-text:#475569;--loading-spinner:rgba(99,102,241,0.3);--loading-spinner-top:#6366f1}
html.dark{--loading-bg:#111827;--loading-text:#64748b;--loading-spinner:rgba(255,255,255,0.04);--loading-spinner-top:#6366f1}
</style>
<script>
(function(){
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(reg){reg.unregister();});
    });
  }
})();
</script>
<script>
if(!('noModule' in HTMLScriptElement.prototype)){
  document.write('<body style="background:#111827;color:#cbd5e1;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center;font-family:sans-serif"><div><h2 style="color:#60a5fa;margin-bottom:8px">浏览器不兼容</h2><p>请使用最新版 Chrome、Edge 或 Safari</p></div></body>');
}

<script>
(function(){
  var storeKey = 'gpt-image-playground';
  function hideLoading(){
    var el=document.getElementById('loading-screen');if(el){el.classList.add('hidden');}
  }
  function readStore(){
    try {
      var raw = localStorage.getItem(storeKey);
      return raw ? JSON.parse(raw) : { state: {}, version: 2 };
    } catch(e) {
      return { state: {}, version: 2 };
    }
  }
  function writeStore(next){
    try { localStorage.setItem(storeKey, JSON.stringify(next)); } catch(e) {}
  }
  function getProfile(cfg){
    return {
      id: 'default-openai',
      name: '云端配置',
      provider: 'openai',
      baseUrl: cfg.defaultApiUrl || '',
      apiKey: cfg.apiKey || 'cloudflare-proxy',
      model: cfg.defaultModel || 'gpt-image-2',
      timeout: Number(cfg.timeout) || 6000,
      apiMode: cfg.apiMode || 'images',
      codexCli: !!cfg.codexCli,
      apiProxy: true,
      responseFormatB64Json: false,
      streamImages: !!cfg.streamImages,
      streamPartialImages: Number(cfg.streamPartialImages) || 1
    };
  }
  function applyPromptFromRepository(st){
    try {
      var prompt = sessionStorage.getItem('prompt_to_use');
      if (!prompt) return st;
      sessionStorage.removeItem('prompt_to_use');
      st.state = st.state || {};
      st.state.galleryInputDraft = st.state.galleryInputDraft || {};
      st.state.galleryInputDraft.prompt = prompt;
      st.state.prompt = prompt;
    } catch(e) {}
    return st;
  }
  function syncRuntimeConfig(){
    return fetch('/.well-known/img-runtime-config.json?v=' + Date.now(), { cache: 'no-store' })
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(cfg){
        if (!cfg) return;
        var st = applyPromptFromRepository(readStore());
        var oldState = st.state || {};
        var oldSettings = oldState.settings || {};
        var profile = getProfile(cfg);
        var cfgProfiles = Array.isArray(cfg.profiles) && cfg.profiles.length > 0 ? cfg.profiles : null;
        var cfgProviders = Array.isArray(cfg.customProviders) && cfg.customProviders.length > 0 ? cfg.customProviders : null;
        var settings = Object.assign({}, oldSettings, {
          baseUrl: profile.baseUrl,
          apiKey: profile.apiKey,
          model: profile.model,
          timeout: profile.timeout,
          apiMode: profile.apiMode,
          codexCli: profile.codexCli,
          apiProxy: true,
          streamImages: profile.streamImages,
          streamPartialImages: profile.streamPartialImages,
          customProviders: cfgProviders || (Array.isArray(oldSettings.customProviders) ? oldSettings.customProviders : []),
          clearInputAfterSubmit: !!cfg.clearInputAfterSubmit,
          persistInputOnRestart: !!cfg.persistInput,
          taskCompletionNotification: !!cfg.taskNotification,
          reuseTaskApiProfileTemporarily: cfg.reuseProfile !== undefined ? !!cfg.reuseProfile : !!oldSettings.reuseTaskApiProfileTemporarily,
          alwaysShowRetryButton: cfg.alwaysShowRetry !== undefined ? !!cfg.alwaysShowRetry : !!oldSettings.alwaysShowRetryButton,
          enterSubmit: cfg.enterSubmit !== undefined ? !!cfg.enterSubmit : !!oldSettings.enterSubmit,
          referenceImageEditAction: cfg.refEditAction || oldSettings.referenceImageEditAction || 'ask',
          zipDownloadRoutes: Array.isArray(oldSettings.zipDownloadRoutes) ? oldSettings.zipDownloadRoutes : ['task-selection','favorite-collection-selection'],
          agentScrollToBottomAfterSubmit: cfg.agentScrollAfterSubmit !== false,
          agentMaxToolRounds: Number(cfg.agentMaxToolRounds || cfg.agentMaxRounds) || 32,
          agentWebSearch: !!cfg.agentWebSearch,
          agentMathFormattingPrompt: cfg.mathFormatting !== undefined ? !!cfg.mathFormatting : oldSettings.agentMathFormattingPrompt !== false,
          profiles: cfgProfiles || [profile],
          activeProfileId: cfg.activeProfileId || profile.id
        });
        var oldParams = oldState.params || {};
        var params = Object.assign({}, oldParams, {
          size: cfg.size || oldParams.size || 'auto',
          quality: cfg.quality || oldParams.quality || 'auto',
          output_format: cfg.output_format || oldParams.output_format || 'png',
          output_compression: cfg.output_compression === null || cfg.output_compression === undefined ? (oldParams.output_compression === undefined ? null : oldParams.output_compression) : Number(cfg.output_compression),
          moderation: cfg.moderation || oldParams.moderation || 'auto',
          n: Number(cfg.n || oldParams.n) || 1,
          transparent_output: !!(cfg.transparent_output === true || oldParams.transparent_output === true)
        });
        st.state = Object.assign({}, oldState, { settings: settings, params: params });
        st.version = 2;
        writeStore(st);
      });
  }
  function hideWorkbenchSettings(){
    try {
      var labels = ['settings','Settings','设置','API 配置'];
      Array.prototype.forEach.call(document.querySelectorAll('button,[aria-label],[title]'), function(el){
        var label = el.getAttribute('aria-label') || el.getAttribute('title') || '';
        var text = (el.textContent || '').trim();
        if (labels.indexOf(label) >= 0 || text === '设置') {
          el.style.display = 'none';
          el.style.visibility = 'hidden';
          el.setAttribute('data-hidden-by-shell', 'settings');
        }
      });
    } catch(e) {}
  }
  function watchWorkbenchSettings(){
    hideWorkbenchSettings();
    try {
      new MutationObserver(hideWorkbenchSettings).observe(document.documentElement, { childList: true, subtree: true });
    } catch(e) {
      setInterval(hideWorkbenchSettings, 1000);
    }
  }
  function loadApp(){
    hideLoading();
    var script = document.createElement('script');
    script.type = 'module';
    script.crossOrigin = 'anonymous';
    script.src = './assets/index-DteWE59N.js?v=068-custom-1';
    document.head.appendChild(script);
    watchWorkbenchSettings();
  }
  var configPromise = syncRuntimeConfig();
  var authPromise = fetch('/api/auth/me', { cache: 'no-store' }).then(function(r){
    if (!r.ok) throw new Error('not_authenticated');
    return r;
  });
  window.__themeState={themeKey:'gpt-image2-theme'};
  window.__applyTheme=function(){
    var t=localStorage.getItem(window.__themeState.themeKey)||'system';
    var isDark=t==='dark'||(t==='system'&&window.matchMedia('(prefers-color-scheme: dark)').matches);
    document.documentElement.classList.toggle('dark',isDark);
    var meta=document.getElementById('meta-theme-color');
    if(meta)meta.content=isDark?'#111827':'#f8fafc';
    var btn=document.getElementById('theme-toggle');
    if(btn){btn.textContent=t==='light'?'☀️':t==='dark'?'🌙':'💻';btn.setAttribute('data-theme',t);}
  };
  window.toggleTheme=function(){
    var t=localStorage.getItem(window.__themeState.themeKey)||'system';
    var n=t==='light'?'dark':t==='dark'?'system':'light';
    localStorage.setItem(window.__themeState.themeKey,n);
    window.__applyTheme();
  };
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',function(){
    if((localStorage.getItem(window.__themeState.themeKey)||'system')==='system')window.__applyTheme();
  });
  var safetyTimer = setTimeout(function(){ location.replace('/login'); }, 30000);
  authPromise.then(function(){
    clearTimeout(safetyTimer);
    safetyTimer = setTimeout(function(){ location.replace('/login'); }, 25000);
  });
  Promise.all([authPromise, configPromise]).then(function(){
    clearTimeout(safetyTimer);
    loadApp();
  }).catch(function(){
    clearTimeout(safetyTimer);
    location.replace('/login');
  });
})();
</script>

</head>

  <a href="javascript:toggleTheme()" id="theme-toggle" title="切换主题" style="font-size:16px">☀️</a>
  <a href="/admin" title="管理员后台" aria-label="admin">⚙</a>
</nav>
<script>window.__applyTheme();</script>
</body>
