  function saveThemeMode(t){ try{ fetch('/api/settings/save',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',body:JSON.stringify({settings:{themeMode:t}}),cache:'no-store'}).catch(function(){}); }catch(e){} }
  window.toggleTheme=function(){ var t=localStorage.getItem(themeKey)||'light'; var n=t==='light'?'dark':t==='dark'?'system':'light'; localStorage.setItem(themeKey,n); window.__applyTheme(); saveThemeMode(n); };

  var appStarted=false;

  function delay(ms){return new Promise(function(resolve){setTimeout(resolve,ms);});}
  function authHeaders(){
    var headers={};
    try{
      var token=sessionStorage.getItem('gpt-image2-session-token')||'';
      if(token)headers['X-GPT-Image-Session']=token;
    }catch(e){}
    return headers;
  }
  function checkAuth(authAttempt){
    return fetch('/api/auth/me?t='+Date.now()+'&a='+(authAttempt||0),{cache:'no-store',credentials:'same-origin',headers:authHeaders()})
      .then(function(r){if(!r.ok)throw new Error('not_authenticated');return r.json();})
      .catch(function(e){
        if((authAttempt||0)<2){return delay(isWeChatBrowser()?900:350).then(function(){return checkAuth((authAttempt||0)+1);});}

      });
  }
  var authPromise=checkAuth(0);
  var safetyTimer=setTimeout(function(){handleAuthFailure()},30000);

  authPromise.then(function(user){
    prepareUserLocalStore(user);
    cleanupLegacyWorkersAndCachesOnce();
    resetLegacyAgentStateOnce();
    updateNavUser(user&&user.username,user&&user.role);
    authReady=true;
    clearTimeout(safetyTimer);

    return syncRuntimeConfig().catch(function(e){
      console.warn('[Shell] runtime config sync failed',e);
      if(!hasLocalConfig) showLoadError(e&&e.message?e.message:'\u914d\u7f6e\u52a0\u8f7d\u5931\u8d25\uff0c\u8bf7\u8fdb\u5165\u540e\u53f0\u68c0\u67e5\u5f53\u524d\u7528\u6237\u7684 API \u914d\u7f6e\u3002');
    }).then(function(){
      clearTimeout(bootTimer);
      startWhenDomReady();
    });
  }).catch(function(e){
    if(e&&e.message==='not_authenticated')handleAuthFailure();
    else showLoadError(e&&e.message?e.message:'登录或配置加载失败，请刷新重试。');
  });
})();
