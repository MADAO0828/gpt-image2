<script>
// 立即注销旧的 Service Worker，防止移动端缓存问题
(function(){
  if('serviceWorker' in navigator){
    navigator.serviceWorker.getRegistrations().then(function(regs){
      regs.forEach(function(reg){reg.unregister()});
    });
  }
})();
</script>

<script>
var __s = 'gpt-image-playground';

// 核心同步函数：从云端的单一数据源获取设置并写入 localStorage
// 这会覆盖所有旧数据，确保 SPA 总是读取到管理员设置的最新值
function doSync() {
  var url = '/.well-known/img-runtime-config.json?v=' + Date.now();
  fetch(url).then(function(r){ return r.ok ? r.json() : null; }).then(function(cfg) {
    if (!cfg) return;
    try {
      // 构建 SPA 完整状态结构
      var st = {
        state: {
          settings: {
            baseUrl: cfg.defaultApiUrl || '',
            apiKey: cfg.apiKey || '',
            model: cfg.defaultModel || 'gpt-image-2',
            apiMode: cfg.apiMode || 'images',
            timeout: cfg.timeout || 600,
            apiProxy: !!cfg.apiProxy,
            streamImages: !!cfg.streamImages,
            size: cfg.size || '',
            quality: cfg.quality || 'standard',
            output_format: cfg.output_format || 'png',
            codexCli: !!cfg.codexCli,
            moderation: !!cfg.moderation,
            persistInput: !!cfg.persistInput,
            scrollAfterSubmit: !!cfg.scrollAfterSubmit,
            apiProvider: cfg.apiProvider || 'openai',
            agentWebSearch: !!cfg.agentWebSearch,
            agentMaxRounds: cfg.agentMaxRounds || 32,
            agentScrollAfterSubmit: !!cfg.agentScrollAfterSubmit
          }
        },
        version: 2
      };
      localStorage.setItem(__s, JSON.stringify(st));
      console.log('[Sync] 云端设置已同步到本地');
    } catch(e) {}
  }).catch(function(){});

  // 处理提示词仓库跳转：sessionStorage 中有待使用的提示词
  try {
    var pp = sessionStorage.getItem('prompt_to_use');
    if (pp) {
      sessionStorage.removeItem('prompt_to_use');
      var r2 = localStorage.getItem(__s);
      var st2 = r2 ? JSON.parse(r2) : { state: {}, version: 2 };
      if (!st2.state) st2.state = {};
      if (!st2.state.galleryInputDraft) st2.state.galleryInputDraft = {};
      st2.state.galleryInputDraft.prompt = pp;
      localStorage.setItem(__s, JSON.stringify(st2));
    }
  } catch(e) {}
}

// 页面初始化流程：
// 1. 先检查登录状态（同步缓存后直接执行 doSync）
// 2. 登录成功后，清空旧的 localStorage 再同步 
// 3. 非首次加载同样执行同步，确保管理员设置始终覆盖本地
(function(){
  // 首次加载：检查登录状态
  fetch('/api/auth/me', { cache: 'no-store' }).then(function(r) {
    if (!r.ok) { 
      location.replace('/login'); 
      return; 
    }
    // 已登录：先清空旧的 localStorage 缓存，再从云端同步
    try { localStorage.removeItem(__s); } catch(e) {}
    doSync();
  }).catch(function(){
    location.replace('/login');
  });
})();
</script>
