<script>
(function(){
  var storeKey = 'gpt-image-playground';

  function readStore(){
    try {
      var raw = localStorage.getItem(storeKey);
      return raw ? JSON.parse(raw) : { state: {}, version: 2 };
    } catch(e) {
      return { state: {}, version: 2 };
    }
  }

  function writeStore(next){
    try { localStorage.setItem(storeKey, JSON.stringify(next)); } catch(e) {}
  }

  function getProfile(cfg){
    return {
      id: 'default-openai',
      name: '\u4e91\u7aef\u914d\u7f6e',
      provider: 'openai',
      baseUrl: cfg.defaultApiUrl || '',
      apiKey: 'cloudflare-proxy',
      model: cfg.defaultModel || 'gpt-image-2',
      timeout: Number(cfg.timeout) || 6000,
      apiMode: cfg.apiMode || 'images',
      codexCli: !!cfg.codexCli,
      apiProxy: true,
      responseFormatB64Json: false,
      streamImages: !!cfg.streamImages,
      streamPartialImages: Number(cfg.streamPartialImages) || 1
    };
  }

  function applyPromptFromRepository(st){
    try {
      var prompt = sessionStorage.getItem('prompt_to_use');
      if (!prompt) return st;
      sessionStorage.removeItem('prompt_to_use');
      st.state = st.state || {};
      st.state.galleryInputDraft = st.state.galleryInputDraft || {};
      st.state.galleryInputDraft.prompt = prompt;
      st.state.prompt = prompt;
    } catch(e) {}
    return st;
  }

  function syncRuntimeConfig(){
    return fetch('/.well-known/img-runtime-config.json?v=' + Date.now(), { cache: 'no-store' })
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(cfg){
        if (!cfg) return;
        var st = applyPromptFromRepository(readStore());
        var oldState = st.state || {};
        var oldSettings = oldState.settings || {};
        var profile = getProfile(cfg);
        var settings = Object.assign({}, oldSettings, {
          baseUrl: profile.baseUrl,
          apiKey: profile.apiKey,
          model: profile.model,
          timeout: profile.timeout,
          apiMode: profile.apiMode,
          codexCli: profile.codexCli,
          apiProxy: true,
          streamImages: profile.streamImages,
          streamPartialImages: profile.streamPartialImages,
          customProviders: Array.isArray(oldSettings.customProviders) ? oldSettings.customProviders : [],
          clearInputAfterSubmit: !!cfg.clearInputAfterSubmit,
          persistInputOnRestart: !!cfg.persistInput,
          reuseTaskApiProfileTemporarily: !!oldSettings.reuseTaskApiProfileTemporarily,
          alwaysShowRetryButton: !!oldSettings.alwaysShowRetryButton,
          taskCompletionNotification: !!cfg.taskNotification,
          enterSubmit: !!oldSettings.enterSubmit,
          referenceImageEditAction: oldSettings.referenceImageEditAction || 'ask',
          zipDownloadRoutes: Array.isArray(oldSettings.zipDownloadRoutes) ? oldSettings.zipDownloadRoutes : ['task-selection','favorite-collection-selection'],
          agentScrollToBottomAfterSubmit: cfg.agentScrollAfterSubmit !== false,
          agentMaxToolRounds: Number(cfg.agentMaxToolRounds || cfg.agentMaxRounds) || 32,
          agentWebSearch: !!cfg.agentWebSearch,
          agentMathFormattingPrompt: oldSettings.agentMathFormattingPrompt !== false,
          profiles: [profile],
          activeProfileId: profile.id
        });
        var oldParams = oldState.params || {};
        var params = Object.assign({}, oldParams, {
          size: cfg.size || oldParams.size || 'auto',
          quality: cfg.quality || oldParams.quality || 'auto',
          output_format: cfg.output_format || oldParams.output_format || 'png',
          output_compression: cfg.output_compression === null || cfg.output_compression === undefined ? (oldParams.output_compression === undefined ? null : oldParams.output_compression) : Number(cfg.output_compression),
          moderation: cfg.moderation || oldParams.moderation || 'auto',
          n: Number(cfg.n || oldParams.n) || 1,
          transparent_output: !!(cfg.transparent_output === true || oldParams.transparent_output === true)
        });
        st.state = Object.assign({}, oldState, { settings: settings, params: params });
        st.version = 2;
        writeStore(st);
      });
  }

  function hideWorkbenchSettings(){
    try {
      var labels = ['settings','Settings','\u8bbe\u7f6e','API \u914d\u7f6e'];
      Array.prototype.forEach.call(document.querySelectorAll('button,[aria-label],[title]'), function(el){
        var label = el.getAttribute('aria-label') || el.getAttribute('title') || '';
        var text = (el.textContent || '').trim();
        if (labels.indexOf(label) >= 0 || text === '\u8bbe\u7f6e') {
          el.style.display = 'none';
          el.style.visibility = 'hidden';
          el.setAttribute('data-hidden-by-shell', 'settings');
        }
      });
    } catch(e) {}
  }

  function watchWorkbenchSettings(){
    hideWorkbenchSettings();
    try {
      new MutationObserver(hideWorkbenchSettings).observe(document.documentElement, { childList: true, subtree: true });
    } catch(e) {
      setInterval(hideWorkbenchSettings, 1000);
    }
  }

  function loadApp(){
    var script = document.createElement('script');
    script.type = 'module';
    script.crossOrigin = 'anonymous';
    script.src = './assets/index-DDbPEyO_.js?v=068-custom-1';
    document.head.appendChild(script);
    watchWorkbenchSettings();
  }

  fetch('/api/auth/me', { cache: 'no-store' }).then(function(r){
    if (!r.ok) {
      location.replace('/login');
      return null;
    }
    return syncRuntimeConfig().then(loadApp);
  }).catch(function(){
    location.replace('/login');
  });
})();
</script>
