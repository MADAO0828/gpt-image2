<script>
(function(){
  window.__themeState={themeKey:'gpt-image2-theme'};
  window.__applyTheme=function(){
    var t=localStorage.getItem(window.__themeState.themeKey)||'system';
    var prefersDark=window.matchMedia('(prefers-color-scheme: dark)').matches;
    var isDark=t==='dark'||(t==='system'&&prefersDark);
    document.documentElement.classList.toggle('dark',isDark);
    document.documentElement.classList.toggle('light',!isDark);
    var meta=document.getElementById('meta-theme-color');
    if(meta)meta.content=isDark?'#000':'#fff';
    var btn=document.getElementById('theme-toggle');
    if(btn){btn.textContent=t==='light'?'☀️':t==='dark'?'🌙':'💻';btn.title='click to toggle theme';}
  };
  window.toggleTheme=function(){
    var t=localStorage.getItem(window.__themeState.themeKey)||'system';
    var n=t==='light'?'dark':t==='dark'?'system':'light';
    localStorage.setItem(window.__themeState.themeKey,n);
    window.__applyTheme();
  };
  window.__applyTheme();
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',function(){
    if((localStorage.getItem(window.__themeState.themeKey)||'system')==='system')window.__applyTheme();
  });
})();

    cu = r.data;
    if (cu.role !== 'admin') { location.replace('/'); return; }
    document.getElementById('adminInfo').textContent = '管理员 ' + cu.username;
    loadUsers(); } catch(e) { tc.innerHTML = '<div class="empty">Error: ' + e.message + '</div>'; } }.catch(function() {
    tc.innerHTML = '<div class="empty">验证失败</div>';
  });
}
function loadUsers() {
  tc.innerHTML = '<div class="empty">加载中...</div>';
  var ac = new AbortController();
  var tmr = setTimeout(function(){ ac.abort(); tc.innerHTML = '<div class="empty">加载超时</div>'; }, 20000);
  fetch('/api/admin/users?t=' + Date.now(), { cache: 'no-store', signal: ac.signal }).then(function(r) {
    clearTimeout(tmr);
    return r.json().then(function(d) { return { ok: r.ok, data: d }; }); } catch(e) { tc.innerHTML = '<div class="empty">Error: ' + e.message + '</div>'; } }.then(function(r) {
    if (!r) return;
    if (!r.ok) { tc.innerHTML = '<div class="empty">加载失败: ' + (r.data.error || '') + '</div>'; return; }
    all = r.data.users || [];
    renderUsers();
    updateStats(); } catch(e) { tc.innerHTML = '<div class="empty">Error: ' + e.message + '</div>'; } }.catch(function(err) {
    if (err.name === 'AbortError') { return; }
    clearTimeout(tmr);
    tc.innerHTML = '<div class="empty">网络错误: ' + err.message + '</div>';
  });
}
function updateStats() {
  var total = all.length;
  var admins = all.filter(function(u){ return u.role === 'admin'; }).length;
  document.getElementById('statUsers').textContent = total;
  document.getElementById('statAdmins').textContent = admins;
  var recent = '-';
  all.forEach(function(u){
    if (u.last_login && u.last_login !== '未登录') { if (recent === '-' || u.last_login > recent) recent = u.last_login; }
  });
  document.getElementById('statRecent').textContent = recent !== '-' ? recent.substring(0,10) : '暂无';
}
function renderUsers() {
  if (!all.length) { tc.innerHTML = '<div class="empty">暂无用户</div>'; return; }
  tc.innerHTML = '<div class="tbl-wrap"></div>';
  var wrap = tc.firstChild;
  var tbl = document.createElement('table'); tbl.className = 'tbl';
  tbl.innerHTML = '<thead><tr><th>ID</th><th>用户名</th><th>角色</th><th>创建</th><th>最后登录</th><th>IP</th><th>操作</th></tr></thead>';
  var tb = document.createElement('tbody');
  all.forEach(function(u) {
    var tr = document.createElement('tr');
    tr.innerHTML = '<td>' + u.id + '</td><td>' + esc(u.username) + '</td><td><span class="badge ' + (u.role === 'admin' ? 'badge-a' : 'badge-u') + '">' + (u.role === 'admin' ? '管理员' : '用户') + '</span></td><td>' + (u.created_at || '-') + '</td><td>' + (u.last_login || '未登录') + '</td><td>' + (u.last_ip || '-') + '</td>';
    var atd = document.createElement('td');
    var eb = document.createElement('button');
    eb.className = 'btn btn-s btn-sm'; eb.textContent = '编辑';
    eb.onclick = (function(uu) { return function() { openEdit(uu); }; })(u);
    atd.appendChild(eb);
    if (cu && u.id !== cu.id) {
      var db = document.createElement('button');
      db.className = 'btn btn-d btn-sm'; db.textContent = '删除';
      db.style.marginLeft = '6px';
      db.onclick = (function(uu) { return function() { delUser(uu); }; })(u);
      atd.appendChild(db);
    }
    tr.appendChild(atd);
    tb.appendChild(tr); } catch(e) { tc.innerHTML = '<div class="empty">Error: ' + e.message + '</div>'; } };
  tbl.appendChild(tb);
  wrap.appendChild(tbl);
}
var autoSaveTimer = null;
var saveStatus = document.getElementById('saveStatus');
function setSaveStatus(state) {
  saveStatus.className = 'save-status ' + state;
  var labels = { saving: '保存中...', saved: '已保存 ✓', idle: '已就绪' };
  saveStatus.innerHTML = '<span class="save-dot"></span> ' + (labels[state] || '已就绪');
  if (state === 'saved') {
    clearTimeout(saveStatus._clearTimer);
    saveStatus._clearTimer = setTimeout(function(){ setSaveStatus('idle'); }, 3000);
  }
}
function collectSettings() {
  var s = {
    baseUrl: document.getElementById('cfgBaseUrl').value.trim(),
    apiKey: document.getElementById('cfgApiKey').value.trim(),
    model: document.getElementById('cfgModel').value.trim() || 'gpt-image-2',
    timeout: parseInt(document.getElementById('cfgTimeout').value) || 600,
    apiMode: document.getElementById('cfgApiMode').value,
    apiProxy: document.getElementById('cfgApiProxy').checked,
    codexCli: document.getElementById('cfgCodexCli').checked,
    streamImages: document.getElementById('cfgStreamImages').checked,
    streamPartialImages: parseInt(document.getElementById('cfgStreamPartial').value) || 1,
    persistInput: document.getElementById('cfgPersistInput').checked,
    clearInputAfterSubmit: document.getElementById('cfgClearInput').checked,
    taskNotification: document.getElementById('cfgTaskNotif').checked,
    alwaysShowRetry: document.getElementById('cfgAlwaysRetry').checked,
    reuseProfile: document.getElementById('cfgReuseProfile').checked,
    mathFormatting: document.getElementById('cfgMathFormat').checked,
    refEditAction: document.getElementById('cfgRefEditAction').value,
    enterSubmit: document.getElementById('cfgEnterSubmit').value === 'enter',
    agentWebSearch: document.getElementById('cfgAgentSearch').checked,
    agentMaxRounds: parseInt(document.getElementById('cfgAgentRounds').value) || 32,
    agentScrollAfterSubmit: document.getElementById('cfgAgentScroll').checked,
    activeProfileId: document.getElementById('cfgActiveProfile').value.trim() || 'default-openai',
    size: document.getElementById('cfgSize').value,
    quality: document.getElementById('cfgQuality').value,
    output_format: document.getElementById('cfgOutput').value,
    customProviders: (function(){
      try{var v=document.getElementById('cfgCustomProviders').value.trim();return v?JSON.parse(v):[]}catch(e){return []}
    })(),
    profiles: (function(){
      try{var v=document.getElementById('cfgProfiles').value.trim();return v?JSON.parse(v):[]}catch(e){return []}
    })()
  };
  return { settings: s };
}
function doSaveSettings(isAuto) {
  setSaveStatus('saving');
  var data = collectSettings();
  if (!isAuto) {
    var btn = document.getElementById('saveSettingsBtn');
    btn.disabled = true;
    btn.textContent = '保存中...';
  }
  fetch('/api/settings/save', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(function(r) {
    return r.json(); } catch(e) { tc.innerHTML = '<div class="empty">Error: ' + e.message + '</div>'; } }.then(function(d) {
    if (!isAuto) {
      var btn = document.getElementById('saveSettingsBtn');
      btn.disabled = false;
      btn.textContent = '保存设置';
    }
    if (d.success) {
      if (!isAuto) T('设置已保存，将同步到所有设备', 's');
      setSaveStatus('saved');
    } else {
      T(d.error || '保存失败', 'e');
      setSaveStatus('idle');
    }
  }).catch(function() {
    if (!isAuto) {
      var btn = document.getElementById('saveSettingsBtn');
      btn.disabled = false;
      btn.textContent = '保存设置';
    }
    T('网络错误', 'e');
    setSaveStatus('idle'); } catch(e) { tc.innerHTML = '<div class="empty">Error: ' + e.message + '</div>'; } };
}
function scheduleAutoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(function(){ doSaveSettings(true); }, 2000);
}
function bindAutoSave() {
  var fields = ['cfgBaseUrl','cfgApiKey','cfgModel','cfgTimeout','cfgApiMode',
    'cfgApiProxy','cfgSize','cfgQuality','cfgOutput','cfgCodexCli','cfgStreamImages',
    'cfgStreamPartial','cfgPersistInput','cfgClearInput','cfgTaskNotif',
    'cfgAgentSearch','cfgAgentRounds','cfgAgentScroll','cfgActiveProfile', 'cfgAlwaysRetry','cfgReuseProfile','cfgMathFormat','cfgRefEditAction','cfgEnterSubmit',
    'cfgCustomProviders','cfgProfiles'];
  fields.forEach(function(id) {
    var el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('change', scheduleAutoSave);
    el.addEventListener('input', scheduleAutoSave); } catch(e) { tc.innerHTML = '<div class="empty">Error: ' + e.message + '</div>'; } };
}
function loadSettings() {
  var ac = new AbortController();
  var tmr = setTimeout(function(){ ac.abort(); }, 20000);
  fetch('/api/settings/save?t=' + Date.now(), { cache: 'no-store', signal: ac.signal }).then(function(r) {
    clearTimeout(tmr);
    return r.ok ? r.json() : null;
  }).then(function(d) {
    if (!d || !d.settings) return;
    var s = d.settings;
    document.getElementById('cfgBaseUrl').value = s.baseUrl || '';
    document.getElementById('cfgApiKey').value = s.apiKey || '';
    document.getElementById('cfgModel').value = s.model || 'gpt-image-2';
    document.getElementById('cfgTimeout').value = s.timeout || 600;
    document.getElementById('cfgApiMode').value = s.apiMode || 'images';
    document.getElementById('cfgApiProxy').checked = !!s.apiProxy;
    document.getElementById('cfgCodexCli').checked = !!s.codexCli;
    document.getElementById('cfgStreamImages').checked = !!s.streamImages;
    if (s.streamPartialImages !== undefined) document.getElementById('cfgStreamPartial').value = s.streamPartialImages;
    document.getElementById('cfgPersistInput').checked = !!s.persistInput;
    document.getElementById('cfgClearInput').checked = !!s.clearInputAfterSubmit;
    document.getElementById('cfgTaskNotif').checked = !!s.taskNotification;
    if (s.alwaysShowRetry !== undefined) document.getElementById('cfgAlwaysRetry').checked = !!s.alwaysShowRetry;
    if (s.reuseProfile !== undefined) document.getElementById('cfgReuseProfile').checked = !!s.reuseProfile;
    if (s.mathFormatting !== undefined) document.getElementById('cfgMathFormat').checked = !!s.mathFormatting;
    if (s.refEditAction) document.getElementById('cfgRefEditAction').value = s.refEditAction;
    if (s.enterSubmit !== undefined) document.getElementById('cfgEnterSubmit').value = s.enterSubmit ? 'enter' : 'ctrl-enter';
    document.getElementById('cfgSize').value = s.size || '';
    document.getElementById('cfgQuality').value = s.quality || 'standard';
    document.getElementById('cfgOutput').value = s.output_format || 'png';
    document.getElementById('cfgAgentSearch').checked = !!s.agentWebSearch;
    document.getElementById('cfgAgentRounds').value = s.agentMaxRounds || 32;
    document.getElementById('cfgAgentScroll').checked = !!s.agentScrollAfterSubmit;
    document.getElementById('cfgActiveProfile').value = s.activeProfileId || 'default-openai';
    document.getElementById('cfgCustomProviders').value = s.customProviders ? JSON.stringify(s.customProviders, null, 2) : '';
    document.getElementById('cfgProfiles').value = s.profiles ? JSON.stringify(s.profiles, null, 2) : '';
    if (s.profiles && Array.isArray(s.profiles)) { profilesData = s.profiles; renderProfiles(); }
  }).catch(function(err) {
    if (err.name === 'AbortError') return;
    clearTimeout(tmr); } catch(e) { tc.innerHTML = '<div class="empty">Error: ' + e.message + '</div>'; } };
}
/* ===== Profile Management ===== */
var profilesData = [];
function renderProfiles() {
  var listEl = document.getElementById('profileList');
  if (!profilesData.length) { listEl.innerHTML = '<div class="empty" style="padding:20px">暂未配置，点击上方按钮添加</div>'; return; }
  var html = '<div class="tbl-wrap"><table class="tbl"><thead><tr><th>名称</th><th>服务商</th><th>模型</th><th>操作</th></tr></thead><tbody>';
  profilesData.forEach(function(p, i) {
    html += '<tr><td>' + esc(p.name || p.id || '') + '</td><td>' + esc(p.provider || '') + '</td><td>' + esc(p.model || '') + '</td>';
    html += '<td><button class="btn btn-s btn-sm" onclick="editProfile(' + i + ')">编辑</button> ';
    html += '<button class="btn btn-d btn-sm" onclick="deleteProfile(' + i + ')">删除</button></td></tr>';
  });
  html += '</tbody></table></div>';
  listEl.innerHTML = html;
  updateActiveProfileDropdown();
}
function updateActiveProfileDropdown() {
  var sel = document.getElementById('cfgActiveProfile');
  if (!sel) return;
  var ids = profilesData.map(function(p) { return p.id || p.name || ''; }).filter(function(id) { return id; });
  var current = sel.value;
  var html = '<select id="cfgActiveProfile" style="width:100%;padding:10px 14px;background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:14px;outline:none">';
  if (!ids.length) { html += '<option value="">无配置</option>'; }
  ids.forEach(function(id) { html += '<option value="' + esc(id) + '"' + (id === current ? ' selected' : '') + '>' + esc(id) + '</option>'; });
  html += '</select>';
  sel.outerHTML = html;
  document.getElementById('cfgActiveProfile').addEventListener('change', scheduleAutoSave);
  document.getElementById('cfgActiveProfile').addEventListener('input', scheduleAutoSave);
}
function openProfileEditor(idx) {
  var editor = document.getElementById('profileEditor');
  document.getElementById('profileEditIdx').value = idx;
  if (idx >= 0 && idx < profilesData.length) {
    var p = profilesData[idx];
    document.getElementById('peName').value = p.name || '';
    document.getElementById('peProvider').value = p.provider || 'openai';
    document.getElementById('peModel').value = p.model || '';
    document.getElementById('peBaseUrl').value = p.baseUrl || '';
    document.getElementById('peApiKey').value = p.apiKey || '';
    document.getElementById('peApiMode').value = p.apiMode || 'images';
    document.getElementById('profileEditorTitle').textContent = '编辑配置';
  } else {
    document.getElementById('peName').value = '';
    document.getElementById('peProvider').value = 'openai';
    document.getElementById('peModel').value = '';
    document.getElementById('peBaseUrl').value = '';
    document.getElementById('peApiKey').value = '';
    document.getElementById('peApiMode').value = 'images';
    document.getElementById('profileEditorTitle').textContent = '添加配置';
  }
  editor.style.display = 'block';
}
function closeProfileEditor() { document.getElementById('profileEditor').style.display = 'none'; }
function saveProfile() {
  var idx = parseInt(document.getElementById('profileEditIdx').value);
  var profile = {
    id: (document.getElementById('peName').value.trim() || 'profile-' + Date.now()).toLowerCase().replace(/\\s+/g, '-'),
    name: document.getElementById('peName').value.trim() || '未命名',
    provider: document.getElementById('peProvider').value,
    model: document.getElementById('peModel').value.trim(),
    baseUrl: document.getElementById('peBaseUrl').value.trim(),
    apiKey: document.getElementById('peApiKey').value.trim(),
    apiMode: document.getElementById('peApiMode').value,
    apiProxy: true,
    timeout: parseInt(document.getElementById('cfgTimeout').value) || 600,
    codexCli: document.getElementById('cfgCodexCli').checked
  };
  if (idx >= 0 && idx < profilesData.length) { profilesData[idx] = profile; }
  else { profilesData.push(profile); }
  renderProfiles();
  closeProfileEditor();
  syncProfilesToJson();
  scheduleAutoSave();
}
function deleteProfile(idx) {
  if (idx >= 0 && idx < profilesData.length) {
    if (!confirm('确定删除 ' + (profilesData[idx].name || profilesData[idx].id) + ' ？')) return;
    profilesData.splice(idx, 1);
    renderProfiles();
    syncProfilesToJson();
    scheduleAutoSave();
  }
}
function syncProfilesToJson() {
  document.getElementById('cfgProfiles').value = profilesData.length ? JSON.stringify(profilesData, null, 2) : '';
}
function editProfile(idx) { openProfileEditor(idx); }

document.getElementById('addProfileBtn').addEventListener('click', function() { openProfileEditor(-1); });
document.getElementById('closeProfileEditor').addEventListener('click', closeProfileEditor);
document.getElementById('saveProfileBtn').addEventListener('click', saveProfile);

  document.getElementById('mt').textContent = '添加用户';
  document.getElementById('eid').value = ''; document.getElementById('mu').value = ''; document.getElementById('mp').value = '';
  document.getElementById('mp').required = true; document.getElementById('ph').textContent = '';

function delUser(u) {

    return r.json(); } catch(e) { tc.innerHTML = '<div class="empty">Error: ' + e.message + '</div>'; } }.then(function(r) {

function saveUser(ev) {
  ev.preventDefault();
  var id = document.getElementById('eid').value;

    method: id ? 'PUT' : 'POST',

  }).then(function(t) {

    if (t.ok) { T(id ? '已更新' : '已创建', 's'); closeModal(); loadUsers(); }
    else { T(t.data.error || '失败', 'e'); }
  }).catch(function() { T('网络错误', 'e'); });
}
function doLogout() {
  fetch('/api/auth/logout', { method: 'POST' }).then(function() { location.replace('/login'); });
}
