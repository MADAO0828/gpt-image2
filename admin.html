function saveSettings(isAuto){
  if(!settingsLoaded&&!isAuto)return;
  if(saveSettings._inFlight){saveSettings._pending=true;return}
  saveSettings._inFlight=true;
  saveSettings._pending=false;
  setSaveStatus('saving');
  var data=collectSettings();
  var done=false;
  var timer=setTimeout(function(){
    if(done)return;
    done=true;
    saveSettings._inFlight=false;
    setSaveStatus('idle');
    toast('\u4fdd\u5b58\u8d85\u65f6\uff0c\u8bf7\u91cd\u8bd5','e');
    if(saveSettings._pending){saveSettings._pending=false;scheduleAutoSave()}
  },15000);
  apiJson('/api/settings/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)})
    .then(function(r){
      if(done)return;
      done=true;
      clearTimeout(timer);
      saveSettings._inFlight=false;
      if(r.ok&&r.data.success){
        localStorage.setItem('gpt-image2-theme',data.settings.themeMode);
        window.__applyTheme();
        setSaveStatus('saved');
      }else{
        setSaveStatus('idle');
        toast(r.data.error||'\u4fdd\u5b58\u5931\u8d25','e');
      }
      if(saveSettings._pending){saveSettings._pending=false;scheduleAutoSave()}
    })
    .catch(function(){
      if(done)return;
      done=true;
      clearTimeout(timer);
      saveSettings._inFlight=false;
      setSaveStatus('idle');
      toast('\u7f51\u7edc\u9519\u8bef','e');
      if(saveSettings._pending){saveSettings._pending=false;scheduleAutoSave()}
    })
}

function applyProfile(i,notify){var p=profilesData[i];if(!p)return;setVal('cfgActiveProfile',p.id||p.name);setVal('cfgBaseUrl',p.baseUrl||'');setVal('cfgApiKey',Object.prototype.hasOwnProperty.call(p,'apiKey')?p.apiKey:'');setVal('cfgModel',p.model||'gpt-image-2');setVal('cfgTimeout',p.timeout||600);setVal('cfgApiMode',p.apiMode||'images');setBool('cfgApiProxy',p.apiProxy!==false);setBool('cfgCodexCli',!!p.codexCli);setBool('cfgResponseB64',!!p.responseFormatB64Json);setBool('cfgStreamImages',!!p.streamImages);setVal('cfgStreamPartial',p.streamPartialImages==null?1:p.streamPartialImages);scheduleAutoSave()}
function deleteProfile(i){if(!profilesData[i])return;if(!confirm('确定删除 '+(profilesData[i].name||profilesData[i].id)+'？'))return;profilesData.splice(i,1);renderProfiles();scheduleAutoSave()}
function fetchModels(base,key,targetInput,listEl,btn){base=(base||'').trim();key=(key||'').trim();if(!base||!key){listEl.innerHTML='<span style="color:var(--r)">请先填写 API 地址和 Key</span>';return}if(btn){btn.disabled=true;btn.textContent='加载'}listEl.innerHTML='加载中...';apiJson('/api/models',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({baseUrl:base,apiKey:key})}).then(function(r){if(btn){btn.disabled=false;btn.textContent='获取'}if(!r.ok){listEl.innerHTML='<span style="color:var(--r)">'+esc(r.data.error||'失败')+'</span>';return}var models=r.data.models||[];if(!models.length){listEl.innerHTML='未找到模型，也可以手动输入模型名称';return}var id='modelSelect_'+Math.random().toString(36).slice(2,8);listEl.innerHTML='<select id="'+id+'">'+models.map(function(m){return'<option value="'+esc(m.id)+'">'+esc(m.id+(m.ownedBy?' ('+m.ownedBy+')':''))+'</option>'}).join('')+'</select><button class="btn btn-s btn-sm" type="button" onclick="document.getElementById(\''+targetInput+'\').value=document.getElementById(\''+id+'\').value;scheduleAutoSave()">应用选择</button>'}).catch(function(){if(btn){btn.disabled=false;btn.textContent='获取'}listEl.innerHTML='<span style="color:var(--r)">网络错误</span>'})}
document.getElementById('cfgApiKeyToggle').addEventListener('click',function(){toggleSecret('cfgApiKey','cfgApiKeyToggle')});document.getElementById('peApiKeyToggle').addEventListener('click',function(){toggleSecret('peApiKey','peApiKeyToggle')});document.getElementById('addProfileBtn').addEventListener('click',function(){openProfileEditor(-1)});document.getElementById('closeProfileEditor').addEventListener('click',closeProfileEditor);document.getElementById('saveProfileBtn').addEventListener('click',saveProfile);document.getElementById('fetchModelsBtn').addEventListener('click',function(){fetchModels(val('cfgBaseUrl'),val('cfgApiKey'),'cfgModel',document.getElementById('modelList'),this)});document.getElementById('peFetchModelsBtn').addEventListener('click',function(){fetchModels(val('peBaseUrl'),val('peApiKey'),'peModel',document.getElementById('peModelList'),this)});document.getElementById('cfgActiveProfile').addEventListener('change',function(){var idx=profilesData.findIndex(function(p){return(p.id||p.name)===val('cfgActiveProfile')});if(idx>=0)applyProfile(idx)});document.getElementById('cfgProfiles').addEventListener('change',function(){try{var a=JSON.parse(val('cfgProfiles'));if(Array.isArray(a)){profilesData=a;renderProfiles()}}catch(e){toast('profiles JSON 无效','e')}});document.getElementById('cfgAgentApiMode').addEventListener('change',function(){renderAgentProfileSelectors();updateAgentProfileVisibility()});document.getElementById('exportSettingsBtn').addEventListener('click',function(){document.getElementById('cfgImportExport').value=JSON.stringify(collectSettings().settings,null,2);toast('已导出到文本框')});document.getElementById('importSettingsBtn').addEventListener('click',function(){try{var obj=JSON.parse(val('cfgImportExport'));applySettings(obj);saveSettings(false)}catch(e){toast('JSON 格式无效','e')}});document.getElementById('clearSettingsBtn').addEventListener('click',function(){if(!confirm('确定清空当前用户所有设置？'))return;apiJson('/api/settings/save',{method:'DELETE'}).then(function(r){if(r.ok){toast('已清空');loadSettings()}else toast(r.data.error||'清空失败','e')})});
function toggleSecret(id,btnId){var input=document.getElementById(id),btn=document.getElementById(btnId);if(!input)return;var show=input.type==='password';input.type=show?'text':'password';if(btn){btn.textContent=show?'Hide':'Show';btn.setAttribute('aria-pressed',show?'true':'false')}}
function doLogout(){try{sessionStorage.removeItem('gpt-image2-session-token')}catch(e){}fetch('/api/auth/logout',addAuthFallback({method:'POST',credentials:'same-origin',cache:'no-store'})).then(function(){location.replace('/login')})}
window.openEditUser=openEditUser;window.deleteUser=deleteUser;window.closeUserModal=closeUserModal;window.editProfile=editProfile;window.deleteProfile=deleteProfile;window.applyProfile=applyProfile;window.scheduleAutoSave=scheduleAutoSave;window.doLogout=doLogout;init();window.__applyTheme();
</script></body></html>
