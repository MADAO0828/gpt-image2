<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>AI工作台 - 登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#e2e8f0;padding:20px}
.card{background:rgba(30,41,59,0.8);backdrop-filter:blur(20px);border:1px solid rgba(148,163,184,0.15);border-radius:16px;padding:32px 24px;width:100%;max-width:380px;box-shadow:0 25px 50px rgba(0,0,0,0.4)}
@media(max-width:400px){.card{padding:24px 20px;border-radius:12px}}
.logo{text-align:center;margin-bottom:28px}
.logo h1{font-size:26px;font-weight:700;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo p{color:#64748b;font-size:13px;margin-top:4px}
.fg{margin-bottom:18px}
.fg label{display:block;font-size:13px;font-weight:500;color:#94a3b8;margin-bottom:6px}
.fg input{width:100%;padding:12px 14px;background:rgba(15,23,42,0.6);border:1px solid rgba(148,163,184,0.2);border-radius:10px;color:#e2e8f0;font-size:15px;outline:none;transition:border-color 0.2s}
.fg input:focus{border-color:#38bdf8;box-shadow:0 0 0 3px rgba(56,189,248,0.1)}
.fg input::placeholder{color:#475569}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#38bdf8,#818cf8);border:none;border-radius:10px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:opacity 0.2s,transform 0.1s;-webkit-appearance:none}
.btn:hover{opacity:0.9}
.btn:active{transform:scale(0.98)}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.err{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:10px 14px;font-size:13px;color:#fca5a5;margin-bottom:16px;display:none}
.err.show{display:block}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>AI 工作台</h1>
    <p>图像生成 · 请登录后使用</p>
  </div>
  <div id="err" class="err"></div>
  <form id="f">
    <div class="fg">
      <label>用户名</label>
      <input id="u" placeholder="请输入用户名" required autocomplete="username" />
    </div>
    <div class="fg">
      <label>密码</label>
      <input type="password" id="p" placeholder="请输入密码" required autocomplete="current-password" />
    </div>
    <button type="submit" class="btn" id="btn">登 录</button>
  </form>
</div>
<script>
var e = document.getElementById('err');
var b = document.getElementById('btn');
document.getElementById('f').addEventListener('submit', function(ev) {
  ev.preventDefault();
  e.classList.remove('show');
  b.disabled = true;
  b.textContent = '登录中...';
  var u = document.getElementById('u').value.trim();
  var p = document.getElementById('p').value.trim();
  if (!u || !p) {
    e.textContent = '请输入用户名和密码';
    e.classList.add('show');
    b.disabled = false;
    b.textContent = '登 录';
    return;
  }
  fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: u, password: p })
  }).then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
  .then(function(r) {
    if (!r.ok) {
      e.textContent = r.data.error || '登录失败';
      e.classList.add('show');
      b.disabled = false;
      b.textContent = '登 录';
      return;
    }
    if (r.data.role === 'admin') {
      sessionStorage.setItem('admin_auth', '1');
      location.href = '/admin';
    } else {
      location.href = '/';
    }
  }).catch(function() {
    e.textContent = '网络错误，请稍后重试';
    e.classList.add('show');
    b.disabled = false;
    b.textContent = '登 录';
  });
});
</script>
</body>
</html>
