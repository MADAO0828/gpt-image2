(function(){try{if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(regs){regs.forEach(function(reg){reg.unregister()})})}if(window.caches&&caches.keys){caches.keys().then(function(keys){keys.forEach(function(key){caches.delete(key)})}).catch(function(){})}}catch(e){};function watchSystemTheme(cb){try{var mq=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)');if(!mq)return;if(mq.addEventListener)mq.addEventListener('change',cb);else if(mq.addListener)mq.addListener(cb)}catch(e){}}function safePrefersDark(){try{return !!(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)}catch(e){return false}};window.__themeState={themeKey:'gpt-image2-theme'};window.__applyTheme=function(){var t=localStorage.getItem(window.__themeState.themeKey)||'light';var d=t==='dark'||(t==='system'&&safePrefersDark());document.documentElement.classList.toggle('dark',d);document.documentElement.classList.toggle('light',!d);var m=document.getElementById('meta-theme-color');if(m)m.content=d?'#000':'#fff';var b=document.getElementById('theme-toggle');if(b)b.textContent=t==='light'?'☀️':t==='dark'?'🌙':'💻'};window.toggleTheme=function(){var t=localStorage.getItem(window.__themeState.themeKey)||'light';var n=t==='light'?'dark':t==='dark'?'system':'light';localStorage.setItem(window.__themeState.themeKey,n);window.__applyTheme()};watchSystemTheme(function(){if((localStorage.getItem(window.__themeState.themeKey)||'light')==='system')window.__applyTheme()})})();
