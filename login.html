<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><meta name="theme-color" id="meta-theme-color" content="#fff"><title>AI 工作台 - 登录</title><style>
:root{--bg:#fff;--card:#fff;--b:#e2e8f0;--t:#0f172a;--t2:#64748b;--a:#6366f1;--a2:#8b5cf6;--err:#dc2626;--ok:#16a34a}html.dark{--bg:#000;--card:#080b12;--b:rgba(255,255,255,.1);--t:#fff;--t2:#94a3b8;--a:#818cf8;--a2:#a78bfa;--err:#f87171;--ok:#22c55e}*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:var(--bg);color:var(--t);display:flex;align-items:center;justify-content:center;padding:20px;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}.card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--b);border-radius:22px;padding:30px 24px;box-shadow:0 18px 45px rgba(15,23,42,.12)}.logo{text-align:center;margin-bottom:24px}.logo h1{font-size:28px;background:linear-gradient(135deg,var(--a),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}.logo p{color:var(--t2);font-size:13px;margin-top:6px}.fg{margin-bottom:16px}.fg label{display:block;color:var(--t2);font-size:13px;font-weight:700;margin-bottom:7px}.fg input{width:100%;border:1px solid var(--b);border-radius:12px;background:color-mix(in srgb,var(--card) 85%,var(--bg));color:var(--t);padding:12px 14px;font:inherit;outline:none}.fg input:focus{border-color:var(--a);box-shadow:0 0 0 3px rgba(99,102,241,.13)}.btn{width:100%;border:0;border-radius:12px;padding:12px;font:inherit;font-weight:800;cursor:pointer;transition:transform .14s cubic-bezier(.2,.8,.2,1),box-shadow .18s,filter .18s}.btn:hover{transform:translateY(-1px)}.btn:active{transform:scale(.97);transition-duration:.06s}.btn:focus-visible{outline:2px solid rgba(99,102,241,.55);outline-offset:2px}.btn-p{background:linear-gradient(135deg,var(--a),var(--a2));color:#fff}.btn-s{margin-top:10px;background:transparent;color:var(--t2);border:1px solid var(--b)}.msg{display:none;border-radius:10px;padding:10px 12px;font-size:13px;margin-bottom:14px}.msg.show{display:block}.msg.err{color:var(--err);background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2)}.msg.ok{color:var(--ok);background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2)}#theme-toggle{position:fixed;top:14px;right:14px;border:1px solid var(--b);border-radius:12px;background:var(--card);color:var(--t2);width:38px;height:38px;cursor:pointer;transition:transform .14s,background .18s,color .18s}#theme-toggle:hover{transform:translateY(-1px)}#theme-toggle:active{transform:scale(.94)}</style><script>
(function(){try{if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(regs){regs.forEach(function(reg){reg.unregister()})})}if(window.caches&&caches.keys){caches.keys().then(function(keys){keys.forEach(function(key){caches.delete(key)})}).catch(function(){})}}catch(e){};function watchSystemTheme(cb){try{var mq=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)');if(!mq)return;if(mq.addEventListener)mq.addEventListener('change',cb);else if(mq.addListener)mq.addListener(cb)}catch(e){}}function safePrefersDark(){try{return !!(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)}catch(e){return false}};window.__themeState={themeKey:'gpt-image2-theme'};window.__applyTheme=function(){var t=localStorage.getItem(window.__themeState.themeKey)||'light';var d=t==='dark'||(t==='system'&&safePrefersDark());document.documentElement.classList.toggle('dark',d);document.documentElement.classList.toggle('light',!d);var m=document.getElementById('meta-theme-color');if(m)m.content=d?'#000':'#fff';var b=document.getElementById('theme-toggle');if(b)b.textContent=t==='light'?'☀️':t==='dark'?'🌙':'💻'};window.toggleTheme=function(){var t=localStorage.getItem(window.__themeState.themeKey)||'light';var n=t==='light'?'dark':t==='dark'?'system':'light';localStorage.setItem(window.__themeState.themeKey,n);window.__applyTheme()};watchSystemTheme(function(){if((localStorage.getItem(window.__themeState.themeKey)||'light')==='system')window.__applyTheme()})})();</script></head><body><button onclick="toggleTheme()" id="theme-toggle">☀️</button><div class="card"><div class="logo"><h1>AI 工作台</h1><p id="modeHint">登录后进入后台配置工作台</p></div><div id="msg" class="msg"></div><form id="form"><div class="fg"><label>用户名</label><input id="u" required autocomplete="username" placeholder="请输入用户名"></div><div class="fg"><label>密码</label><input id="p" type="password" required autocomplete="current-password" placeholder="请输入密码"></div><button class="btn btn-p" id="submitBtn" type="submit">登 录</button><button class="btn btn-s" id="toggleBtn" type="button">没有账号？注册</button></form></div><script>
try{['gpt-image-playground','gpt-image2-settings','settings_cache'].forEach(function(k){localStorage.removeItem(k)});sessionStorage.removeItem('admin_auth');sessionStorage.removeItem('_synced');sessionStorage.removeItem('gpt-image2-session-token')}catch(e){}
var mode='login',msg=document.getElementById('msg'),submitBtn=document.getElementById('submitBtn'),toggleBtn=document.getElementById('toggleBtn');function utf8b64(s){try{return btoa(unescape(encodeURIComponent(s)))}catch(e){return ''}}function show(text,type){msg.textContent=text;msg.className='msg show '+(type||'err')}function setBusy(b){submitBtn.disabled=b;submitBtn.textContent=b?(mode==='login'?'登录中...':'注册中...'):(mode==='login'?'登 录':'注 册')}function setMode(m){mode=m;document.getElementById('modeHint').textContent=m==='login'?'登录后进入后台配置工作台':'注册后会自动进入后台';submitBtn.textContent=m==='login'?'登 录':'注 册';toggleBtn.textContent=m==='login'?'没有账号？注册':'已有账号？登录';msg.className='msg'}toggleBtn.onclick=function(){setMode(mode==='login'?'register':'login')};document.getElementById('form').addEventListener('submit',function(ev){ev.preventDefault();var u=document.getElementById('u').value.trim(),p=document.getElementById('p').value.trim();if(!u||!p){show('请输入用户名和密码');return}if(mode==='register'&&p.length<4){show('密码至少4个字符');return}setBusy(true);fetch(mode==='login'?'/api/auth/login':'/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},credentials:'same-origin',cache:'no-store',body:JSON.stringify({username:u,usernameB64:utf8b64(u),password:p})}).then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d}})}).then(function(r){if(!r.ok){show(r.data.error||(mode==='login'?'登录失败':'注册失败'));setBusy(false);return}try{if(r.data&&r.data.token)sessionStorage.setItem('gpt-image2-session-token',r.data.token)}catch(e){}var tk=(r.data&&r.data.token)?encodeURIComponent(r.data.token):'';location.href=tk?('/admin#gi2token='+tk):'/admin'}).catch(function(){show('网络错误，请稍后重试');setBusy(false)})});window.__applyTheme();</script></body></html>
